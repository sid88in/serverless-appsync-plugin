service: appsync-substitutions

provider:
  name: aws
  runtime: nodejs22.x

plugins:
  - serverless-appsync-plugin

appSync:
  name: substitutions
  authentication:
    type: API_KEY
  apiKeys:
    - name: default

  # Substitutions are replaced inside VTL templates at synthesis time.
  # Useful for parameterizing templates with stage-specific values
  # without committing them to template files.
  substitutions:
    TABLE_NAME:
      Ref: UsersTable
    ENVIRONMENT: ${sls:stage}

  resolvers:
    Query.getUser:
      kind: UNIT
      dataSource: users
      request: ./resolvers/getUser.request.vtl
      response: ./resolvers/getUser.response.vtl

  dataSources:
    users:
      type: AMAZON_DYNAMODB
      config:
        tableName: !Ref UsersTable

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-users
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
