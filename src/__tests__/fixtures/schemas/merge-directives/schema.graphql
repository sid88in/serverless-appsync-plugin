type Query {
  getUser(id: ID!): User! @canonical
  internalUser(id: ID!): User! @hidden
  legacyUser(id: ID!): User! @renamed
}

type User @canonical {
  id: ID!
  name: String! @canonical
  email: String! @hidden
  oldField: String @renamed
}

type Post @hidden {
  id: ID!
}

type Comment @renamed {
  id: ID!
}
