name: Tests

on:
  pull_request:
    branches:
      - master
      - alpha
  push:
    branches:
      - master
      - alpha

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24, 26]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Verify no deep serverless/lib imports (guards #632)
        run: npm run verify:imports
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm run test
      - name: Run npm pack dry-run
        run: npm pack --dry-run
      - name: Check if lib directory exists
        run: |
          if [ ! -d "lib" ]; then
            echo "Error: lib directory does not exist"
            exit 1
          fi
      - name: Check if lib directory has files
        run: |
          if [ -z "$(ls -A lib)" ]; then
            echo "Error: lib directory is empty"
            exit 1
          fi

  e2e:
    name: CFN Synthesis Tests
    runs-on: ubuntu-latest
    needs: tests
    # Serverless Framework v4 requires authentication for every CLI invocation,
    # including non-interactive CI. The e2e harness spawns `serverless package`,
    # so a license/access key must be present or the run will fail/prompt.
    # Add SERVERLESS_ACCESS_KEY (Dashboard > Settings > Access Keys) as a repo
    # secret. Free for individual developers / orgs under the revenue threshold.
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run CFN synthesis tests
        run: npm run test:e2e
